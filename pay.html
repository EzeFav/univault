<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniVault Payment</title>
    <script src="https://js.paystack.co/v1/inline.js"></script>
</head>
<body>
    <script>
        function getParam(name) {
            var url = window.location.search;
            var params = new URLSearchParams(url);
            return params.get(name);
        }

        var email = getParam("email");
        var amount = getParam("amount");
        var ref = getParam("ref");
        
        // Grab all the extra data we attached to the URL in Sketchware
        var uid = getParam("uid");
        var type = getParam("type");
        var universityId = getParam("universityId");
        var departmentId = getParam("departmentId");
        var level = getParam("level");
        var semester = getParam("semester");
        var academicYear = getParam("academicYear");
        var courseCode = getParam("courseCode");

        window.onload = function() {
            var handler = PaystackPop.setup({
                key: "pk_test_37de2bf6a99cf54bb6d916d3dd55fdd6eb90068e", // Remember to change this to your LIVE key later!
                email: email,
                amount: amount,
                currency: "NGN",
                ref: ref,
                
                // Pack the backpack so Paystack can send this to Render
                metadata: {
                    custom_fields: [
                        { display_name: "UID", variable_name: "uid", value: uid },
                        { display_name: "Type", variable_name: "type", value: type },
                        { display_name: "University ID", variable_name: "universityId", value: universityId },
                        { display_name: "Department ID", variable_name: "departmentId", value: departmentId },
                        { display_name: "Level", variable_name: "level", value: level },
                        { display_name: "Semester", variable_name: "semester", value: semester },
                        { display_name: "Academic Year", variable_name: "academicYear", value: academicYear },
                        { display_name: "Course Code", variable_name: "courseCode", value: courseCode }
                    ]
                },
                
                callback: function(response) {
                    window.location.href = "https://EzeFav.github.io/univault/success.html?ref=" + response.reference;
                },
                onClose: function() {
                    window.location.href = "https://EzeFav.github.io/univault/cancel.html";
                }
            });
            handler.openIframe();
        };
    </script>
</body>
</html>
